# ============================================================
# Clawith CI/CD Pipeline
# 基于 Drone CI 的自动化构建和部署配置 (私有服务器环境)
# ============================================================

kind: pipeline
type: docker
name: clawith-private-cicd

# 配置工作区，用于跨步骤共享文件
workspace:
  path: /drone/src

# 禁用默认克隆，使用自定义克隆步骤
clone:
  disable: true

steps:
  # --------------------------------------------------------
  # Step 1: 代码克隆
  # 使用浅克隆加速代码拉取
  # --------------------------------------------------------
  - name: clone
    image: alpine/git
    pull: if-not-exists
    environment:
      http_proxy:
        from_secret: PROXY
      https_proxy:
        from_secret: PROXY
    commands:
      - git config --global core.compression 0
      - git config --global http.postBuffer 524288000
      - git clone https://github.com/dataelement/Clawith.git .
      - git checkout $DRONE_COMMIT

  # --------------------------------------------------------
  # Step 2: 构建 Docker 镜像并保存
  # 构建后端和前端应用镜像并保存为本地文件
  # --------------------------------------------------------
  - name: build-and-save
    image: docker:24.0.6
    pull: if-not-exists
    privileged: true
    volumes:
      - name: docker-socket
        path: /var/run/docker.sock
      - name: docker-cache
        path: /var/cache/docker
    environment:
      http_proxy:
        from_secret: PROXY
      https_proxy:
        from_secret: PROXY
      # 如果需要可以加 no_proxy
      # 镜像配置
      BACKEND_IMAGE: clawith-backend
      FRONTEND_IMAGE: clawith-frontend
      IMAGE_TAG: private
    commands:
      - echo "========================================"
      - echo "🚀 开始构建 Docker 镜像"
      - echo "事件： $DRONE_BUILD_EVENT"
      - echo "目标分支： $DRONE_BRANCH"
      - echo "来源分支： $DRONE_SOURCE_BRANCH"
      - echo "提交： $DRONE_COMMIT_SHORT"
      - echo "作者： $DRONE_COMMIT_AUTHOR"
      - echo "========================================"
      # 构建后端镜像
      - docker build -t $BACKEND_IMAGE:$IMAGE_TAG -f backend/Dockerfile ./backend
      # 构建前端镜像
      - docker build -t $FRONTEND_IMAGE:$IMAGE_TAG -f frontend/Dockerfile ./frontend
      # 保存镜像为 tar 文件
      - docker save -o clawith-backend-private.tar $BACKEND_IMAGE:$IMAGE_TAG
      - docker save -o clawith-frontend-private.tar $FRONTEND_IMAGE:$IMAGE_TAG
      # 设置文件权限，确保可以被其他步骤读取
      - chmod 644 clawith-backend-private.tar clawith-frontend-private.tar
      - ls -la *.tar

  # --------------------------------------------------------
  # Step 3: 传输镜像文件到私有服务器
  # --------------------------------------------------------
  - name: scp-image
    image: appleboy/drone-scp
    pull: if-not-exists
    settings:
      host:
        from_secret: PRIVATE_SERVER_IP  # 在 Drone Secret 中配置私有服务器 IP，或直接写死
      username: root
      password:
        from_secret: sshpwd
      port: 22
      command_timeout: 10m
      target: /opt/server/clawith-private/
      source:
        - clawith-backend-private.tar
        - clawith-frontend-private.tar
      rm: false
    when:
      event:
        - push

  # --------------------------------------------------------
  # Step 4: 部署到私有服务器环境
  # 在目标服务器上加载镜像并启动服务
  # --------------------------------------------------------
  - name: deploy-to-private
    image: appleboy/drone-ssh
    pull: if-not-exists
    settings:
      host:
        from_secret: PRIVATE_SERVER_IP
      username: root
      password:
        from_secret: sshpwd
      script:
        - |
          set -eu
          echo "========================================"
          echo "🔄 开始部署到私有服务器环境"
          echo "========================================"

          if docker compose version >/dev/null 2>&1; then
            compose() { docker compose -p clawith-private -f docker-compose.drone.yml "$@"; }
          elif command -v docker-compose >/dev/null 2>&1; then
            compose() { docker-compose -p clawith-private -f docker-compose.drone.yml "$@"; }
          else
            echo "❌ 未找到 docker compose / docker-compose"
            exit 1
          fi

          DEPLOY_DIR=/opt/server/clawith-private
          mkdir -p "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"

          if [ ! -f .env ]; then
            cat > .env <<'EOF'
          SECRET_KEY=change-me-in-production
          JWT_SECRET_KEY=change-me-jwt-secret
          PUBLIC_BASE_URL=
          PASSWORD_RESET_TOKEN_EXPIRE_MINUTES=30
          FEISHU_APP_ID=
          FEISHU_APP_SECRET=
          FEISHU_REDIRECT_URI=
          JINA_API_KEY=
          EXA_API_KEY=
          EOF
          fi

          echo "📦 加载 Docker 镜像"
          docker load -i clawith-backend-private.tar
          docker load -i clawith-frontend-private.tar
          rm -f clawith-backend-private.tar clawith-frontend-private.tar

          cat > docker-compose.drone.yml <<'EOF'
          services:
            postgres:
              image: postgres:15-alpine
              restart: unless-stopped
              environment:
                POSTGRES_USER: clawith
                POSTGRES_PASSWORD: clawith
                POSTGRES_DB: clawith
              volumes:
                - pgdata:/var/lib/postgresql/data
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U clawith -d clawith"]
                interval: 5s
                timeout: 5s
                retries: 10

            redis:
              image: redis:7-alpine
              restart: unless-stopped
              volumes:
                - redisdata:/data
              healthcheck:
                test: ["CMD", "redis-cli", "ping"]
                interval: 5s
                timeout: 5s
                retries: 10

            backend:
              image: clawith-backend:private
              restart: unless-stopped
              command: ["/bin/bash", "/app/entrypoint.sh"]
              env_file:
                - .env
              environment:
                DATABASE_URL: postgresql+asyncpg://clawith:clawith@postgres:5432/clawith
                REDIS_URL: redis://redis:6379/0
                AGENT_DATA_DIR: /data/agents
                AGENT_TEMPLATE_DIR: /app/agent_template
                SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
                JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-secret}
                CORS_ORIGINS: '["*"]'
                FEISHU_APP_ID: ${FEISHU_APP_ID:-}
                FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
                FEISHU_REDIRECT_URI: ${FEISHU_REDIRECT_URI:-}
                JINA_API_KEY: ${JINA_API_KEY:-}
                EXA_API_KEY: ${EXA_API_KEY:-}
                DOCKER_NETWORK: clawith_yaojin_network
                SS_CONFIG_FILE: /data/ss-nodes.json
                PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
                PASSWORD_RESET_TOKEN_EXPIRE_MINUTES: ${PASSWORD_RESET_TOKEN_EXPIRE_MINUTES:-30}
              ports:
                - "8008:8000"
              volumes:
                - agentdata:/data/agents
                - /var/run/docker.sock:/var/run/docker.sock
              depends_on:
                postgres:
                  condition: service_healthy
                redis:
                  condition: service_healthy
              healthcheck:
                test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
                interval: 15s
                timeout: 5s
                retries: 10
                start_period: 30s

            frontend:
              image: clawith-frontend:private
              restart: unless-stopped
              ports:
                - "3008:3000"
              depends_on:
                backend:
                  condition: service_healthy

          volumes:
            pgdata:
            redisdata:
            agentdata:
          EOF

          echo "🚀 启动服务"
          compose config -q
          compose up -d --force-recreate --remove-orphans postgres redis backend frontend

          echo "⏳ 等待后端健康检查通过..."
          i=0
          until curl -fsS http://127.0.0.1:8008/api/health >/dev/null 2>&1; do
            i=$((i+1))
            if [ "$i" -ge 40 ]; then
              echo "❌ 后端启动失败或超时，打印最近日志："
              compose logs --tail=80 backend postgres redis frontend
              exit 1
            fi
            sleep 3
          done

          compose ps
          docker image prune -af --filter "until=168h"
          echo "✅ 部署完成"
    when:
      event:
        - push

trigger:
  branch:
    - main
    - release
    - feat-devops
  event:
    - push
    - pull_request

volumes:
- name: docker-socket # 使用宿主机的docker
  host: 
    path: /var/run/docker.sock
